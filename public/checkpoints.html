<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tic Tac Toe AI</title>
    <link href="/styles.css" rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 20px 0;
      }
      input,
      button {
        padding: 8px;
        font-size: 16px;
      }
      button {
        cursor: pointer;
      }
      .user-info {
        margin: 20px 0;
      }
      .hidden {
        display: none;
      }
      .game-container {
        margin: 20px auto;
        max-width: 300px;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        margin: 20px auto;
      }
      .cell {
        width: 100px;
        height: 100px;
        background-color: #f0f0f0;
        border: 2px solid #333;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 48px;
        cursor: pointer;
      }
      .cell:hover {
        background-color: #e0e0e0;
      }
      .status {
        margin: 20px 0;
        font-size: 20px;
        font-weight: bold;
      }
      .game-actions {
        margin: 20px 0;
      }
      .game-actions button {
        margin: 0 10px;
        padding: 10px 20px;
      }
      /* Game mode toggle styles */
      .game-mode-toggle {
        margin: 20px 0;
      }
      .game-mode-toggle button {
        margin: 0 10px;
        padding: 8px 16px;
      }
      /* Difficulty selector styles */
      .difficulty-selector {
        margin: 10px 0;
      }
      .difficulty-selector select {
        padding: 8px;
        font-size: 16px;
        margin-left: 10px;
      }
      /* AI comment styles */
      .ai-comment {
        margin: 10px 0;
        font-style: italic;
        color: #555;
        min-height: 20px;
      }
      /* Game history modal styles */
      .game-history {
        margin: 20px 0;
      }
      #history-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #history-modal.hidden {
        display: none;
      }
      #history-modal .modal-content {
        background: white;
        padding: 20px;
        border-radius: 5px;
        max-width: 80%;
        max-height: 80%;
        overflow: auto;
      }
      #games-list {
        margin: 10px 0;
      }
      #games-list .game-item {
        margin: 10px 0;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
      /* Stats modal styles */
      #stats-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #stats-modal.hidden {
        display: none;
      }
      #stats-modal .modal-content {
        background: white;
        padding: 20px;
        border-radius: 5px;
        max-width: 80%;
        max-height: 80%;
        overflow: auto;
      }
      .stats-tabs {
        display: flex;
        justify-content: center;
        margin-bottom: 20px;
      }
      .stats-tabs button {
        margin: 0 10px;
        padding: 8px 16px;
        cursor: pointer;
      }
      .stats-content {
        margin: 20px 0;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 10px 0;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #f2f2f2;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe AI</h1>

    <!-- Welcome message (hidden by default) -->
    <div class="user-info hidden" id="welcome-message">
      <p>Welcome, <span id="username"></span>!</p>
      <a href="/logout" id="logout-link">Logout</a>
    </div>

    <!-- Auth forms (shown by default) -->
    <div id="auth-forms">
      <h2>Register</h2>
      <form action="/register" method="POST">
        <input name="username" type="text" placeholder="Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button type="submit">Register</button>
      </form>

      <h2>Login</h2>
      <form action="/login" method="POST">
        <input name="username" type="text" placeholder="Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Game Board (shown only when logged in) -->
    <div id="game-container" class="game-container hidden">
      <!-- Game Mode Toggle -->
      <div class="game-mode-toggle">
        <button id="pvp-btn">PvP (Human vs Human)</button>
        <button id="pvai-btn">PvAI (Human vs AI)</button>
      </div>
      <!-- Difficulty selector (for PvAI mode) -->
      <div class="difficulty-selector">
        <label for="difficulty">AI Difficulty:</label>
        <select id="difficulty" disabled>
          <option value="easy">Easy (Random)</option>
          <option value="medium" selected>Medium (Smart)</option>
          <option value="hard">Hard (Groq)</option>
        </select>
      </div>

      <!-- Personality selector (for PvAI mode) -->
      <div class="personality-selector">
        <label for="personality">AI Personality:</label>
        <select id="personality" disabled>
          <option value="aggressive">Aggressive</option>
          <option value="defensive">Defensive</option>
          <option value="chill" selected>Chill</option>
        </select>
      </div>
      <!-- AI comment display -->
      <div class="ai-comment" id="ai-comment"></div>
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="game-actions">
        <button id="new-game-btn">New Game</button>
      </div>
      <!-- Stats Button -->
      <div class="game-actions">
        <button id="view-stats-btn">View Stats</button>
      </div>
      <!-- Game History Section -->
      <div class="game-history">
        <button id="view-history-btn">View Game History</button>
        <div id="history-modal" class="hidden">
          <div class="modal-content">
            <h3>Your Game History</h3>
            <div id="games-list"></div>
            <button id="close-history-btn">Close</button>
          </div>
        </div>
      </div>
      <!-- Stats Modal -->
      <div id="stats-modal" class="hidden">
        <div class="modal-content">
          <h3>Stats</h3>
          <div class="stats-tabs">
            <button id="leaderboard-tab">Leaderboard</button>
            <button id="ai-stats-tab">AI Stats</button>
          </div>
          <div class="stats-content">
            <div id="leaderboard-content">
              <h4>Leaderboard</h4>
              <table id="leaderboard-table">
                <thead>
                  <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Wins</th>
                    <th>Ties</th>
                    <th>Losses</th>
                    <th>Total Games</th>
                  </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
              </table>
            </div>
            <div id="ai-stats-content" class="hidden">
              <h4>AI Stats</h4>
              <h5>By Difficulty</h5>
              <table id="ai-difficulty-table">
                <thead>
                  <tr>
                    <th>Difficulty</th>
                    <th>Wins</th>
                    <th>Ties</th>
                    <th>Losses</th>
                    <th>Total</th>
                    <th>Win Rate (%)</th>
                  </tr>
                </thead>
                <tbody id="ai-difficulty-body"></tbody>
              </table>
              <h5>By Personality</h5>
              <table id="ai-personality-table">
                <thead>
                  <tr>
                    <th>Personality</th>
                    <th>Wins</th>
                    <th>Ties</th>
                  </tr>
                </thead>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
