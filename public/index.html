<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tic Tac Toe AI</title>
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 20px 0;
      }
      input,
      button {
        padding: 8px;
        font-size: 16px;
      }
      button {
        cursor: pointer;
      }
      .user-info {
        margin: 20px 0;
      }
      .hidden {
        display: none;
      }
      /* Game board styles */
      .game-container {
        margin: 20px auto;
        max-width: 300px;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        margin: 20px auto;
      }
      .cell {
        width: 100px;
        height: 100px;
        background-color: #f0f0f0;
        border: 2px solid #333;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 48px;
        cursor: pointer;
      }
      .cell:hover {
        background-color: #e0e0e0;
      }
      .status {
        margin: 20px 0;
        font-size: 20px;
        font-weight: bold;
      }
      .game-actions {
        margin: 20px 0;
      }
      .game-actions button {
        margin: 0 10px;
        padding: 10px 20px;
      }
      /* Game history modal styles */
      .game-history {
        margin: 20px 0;
      }
      #history-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #history-modal.hidden {
        display: none;
      }
      #history-modal .modal-content {
        background: white;
        padding: 20px;
        border-radius: 5px;
        max-width: 80%;
        max-height: 80%;
        overflow: auto;
      }
      #games-list {
        margin: 10px 0;
      }
      #games-list .game-item {
        margin: 10px 0;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe AI</h1>

    <!-- Welcome message (hidden by default) -->
    <div id="welcome-message" class="user-info hidden">
      <p>Welcome, <span id="username"></span>!</p>
      <a href="/logout" id="logout-link">Logout</a>
    </div>

    <!-- Auth forms (shown by default) -->
    <div id="auth-forms">
      <h2>Register</h2>
      <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Register</button>
      </form>

      <h2>Login</h2>
      <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Game Board (shown only when logged in) -->
    <div id="game-container" class="game-container hidden">
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="game-actions">
        <button id="new-game-btn">New Game</button>
      </div>
      <!-- Game History Section -->
      <div class="game-history">
        <button id="view-history-btn">View Game History</button>
        <div id="history-modal" class="hidden">
          <div class="modal-content">
            <h3>Your Game History</h3>
            <div id="games-list"></div>
            <button id="close-history-btn">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Client-side script -->
    <script>
      // Check auth status
      fetch("/check-auth")
        .then((response) => response.json())
        .then((data) => {
          if (data.loggedIn) {
            document.getElementById("auth-forms").classList.add("hidden");
            document
              .getElementById("welcome-message")
              .classList.remove("hidden");
            document.getElementById("username").textContent = data.username;
            document
              .getElementById("game-container")
              .classList.remove("hidden");
            initializeGame();
          }
        });

      // Game logic
      function initializeGame() {
        const board = document.getElementById("board");
        const cells = document.querySelectorAll(".cell");
        const statusDisplay = document.getElementById("status");
        const newGameBtn = document.getElementById("new-game-btn");
        const viewHistoryBtn = document.getElementById("view-history-btn");
        const historyModal = document.getElementById("history-modal");
        const closeHistoryBtn = document.getElementById("close-history-btn");
        const gamesList = document.getElementById("games-list");

        let currentPlayer = "X";
        let gameState = ["", "", "", "", "", "", "", "", ""];
        let gameActive = true;

        // Win conditions
        const winConditions = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8], // Rows
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8], // Columns
          [0, 4, 8],
          [2, 4, 6], // Diagonals
        ];

        // Handle cell click
        function handleCellClick(e) {
          // Prevent clicks if modal is open or game is inactive
          if (!historyModal.classList.contains("hidden") || !gameActive) {
            return;
          }

          const clickedCell = e.target;
          const clickedCellIndex = parseInt(
            clickedCell.getAttribute("data-index"),
          );

          if (gameState[clickedCellIndex] !== "") {
            return;
          }

          gameState[clickedCellIndex] = currentPlayer;
          clickedCell.textContent = currentPlayer;

          if (checkWin()) {
            statusDisplay.textContent = `Player ${currentPlayer} wins!`;
            saveGame(currentPlayer);
            gameActive = false;
            return;
          } else if (checkTie()) {
            statusDisplay.textContent = "Game ended in a tie!";
            saveGame(null);
            gameActive = false;
            return;
          }

          currentPlayer = currentPlayer === "X" ? "O" : "X";
          statusDisplay.textContent = `Player ${currentPlayer}'s turn`;
        }

        // Check for win
        function checkWin() {
          return winConditions.some((condition) => {
            return condition.every((index) => {
              return gameState[index] === currentPlayer;
            });
          });
        }

        // Check for tie
        function checkTie() {
          return !gameState.includes("");
        }

        // Save game to server
        function saveGame(winner) {
          fetch("/save-game", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              moves: gameState,
              winner: winner,
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              console.log("Game saved:", data);
            })
            .catch((error) => {
              console.error("Error saving game:", error);
            });
        }

        // Load and display game history
        function loadGameHistory() {
          fetch("/user-games")
            .then((response) => response.json())
            .then((games) => {
              gamesList.innerHTML = "";
              if (games.length === 0) {
                gamesList.innerHTML = "<p>No games played yet.</p>";
                return;
              }
              games.forEach((game, index) => {
                const gameItem = document.createElement("div");
                gameItem.className = "game-item";
                const winnerText = game.winner
                  ? `Winner: ${game.winner}`
                  : "Tie";
                const date = new Date(game.timestamp).toLocaleString();
                gameItem.innerHTML = `
                  <p><strong>Game ${index + 1}</strong> - ${date}</p>
                  <p>${winnerText}</p>
                  <p>Moves: ${game.moves.join(", ")}</p>
                `;
                gamesList.appendChild(gameItem);
              });
            })
            .catch((error) => {
              console.error("Error loading game history:", error);
              gamesList.innerHTML = "<p>Error loading game history.</p>";
            });
        }

        // Reset game
        function resetGame() {
          gameState = ["", "", "", "", "", "", "", "", ""];
          currentPlayer = "X";
          gameActive = true;
          cells.forEach((cell) => {
            cell.textContent = "";
          });
          statusDisplay.textContent = `Player ${currentPlayer}'s turn`;
        }

        // Add event listeners
        cells.forEach((cell) => {
          cell.addEventListener("click", handleCellClick);
        });
        newGameBtn.addEventListener("click", resetGame);
        viewHistoryBtn.addEventListener("click", () => {
          historyModal.classList.remove("hidden");
          loadGameHistory();
        });
        closeHistoryBtn.addEventListener("click", () => {
          historyModal.classList.add("hidden");
        });
        // Close modal when clicking outside the modal content
        historyModal.addEventListener("click", (e) => {
          if (e.target === historyModal) {
            historyModal.classList.add("hidden");
          }
        });
      }
    </script>
  </body>
</html>
