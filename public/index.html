<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tic Tac Toe AI</title>
    <link href="/styles.css" rel="stylesheet" />
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }
      form {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin: 20px 0;
      }
      input,
      button {
        padding: 8px;
        font-size: 16px;
      }
      button {
        cursor: pointer;
      }
      .user-info {
        margin: 20px 0;
      }
      .hidden {
        display: none;
      }
      .game-container {
        margin: 20px auto;
        max-width: 300px;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 5px;
        margin: 20px auto;
      }
      .cell {
        width: 100px;
        height: 100px;
        background-color: #f0f0f0;
        border: 2px solid #333;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 48px;
        cursor: pointer;
      }
      .cell:hover {
        background-color: #e0e0e0;
      }
      .status {
        margin: 20px 0;
        font-size: 20px;
        font-weight: bold;
      }
      .game-actions {
        margin: 20px 0;
      }
      .game-actions button {
        margin: 0 10px;
        padding: 10px 20px;
      }
      /* Game mode toggle styles */
      .game-mode-toggle {
        margin: 20px 0;
      }
      .game-mode-toggle button {
        margin: 0 10px;
        padding: 8px 16px;
      }
      /* Difficulty selector styles */
      .difficulty-selector {
        margin: 10px 0;
      }
      .difficulty-selector select {
        padding: 8px;
        font-size: 16px;
        margin-left: 10px;
      }
      /* AI comment styles */
      .ai-comment {
        margin: 10px 0;
        font-style: italic;
        color: #555;
        min-height: 20px;
      }
      /* Game history modal styles */
      .game-history {
        margin: 20px 0;
      }
      #history-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      #history-modal.hidden {
        display: none;
      }
      #history-modal .modal-content {
        background: white;
        padding: 20px;
        border-radius: 5px;
        max-width: 80%;
        max-height: 80%;
        overflow: auto;
      }
      #games-list {
        margin: 10px 0;
      }
      #games-list .game-item {
        margin: 10px 0;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }
    </style>
  </head>
  <body>
    <h1>Tic Tac Toe AI</h1>

    <!-- Welcome message (hidden by default) -->
    <div class="user-info hidden" id="welcome-message">
      <p>Welcome, <span id="username"></span>!</p>
      <a href="/logout" id="logout-link">Logout</a>
    </div>

    <!-- Auth forms (shown by default) -->
    <div id="auth-forms">
      <h2>Register</h2>
      <form action="/register" method="POST">
        <input name="username" type="text" placeholder="Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button type="submit">Register</button>
      </form>

      <h2>Login</h2>
      <form action="/login" method="POST">
        <input name="username" type="text" placeholder="Username" required />
        <input
          name="password"
          type="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>
    </div>

    <!-- Game Board (shown only when logged in) -->
    <div id="game-container" class="game-container hidden">
      <!-- Game Mode Toggle -->
      <div class="game-mode-toggle">
        <button id="pvp-btn">PvP (Human vs Human)</button>
        <button id="pvai-btn">PvAI (Human vs AI)</button>
      </div>
      <!-- Difficulty selector (for PvAI mode) -->
      <div class="difficulty-selector">
        <label for="difficulty">AI Difficulty:</label>
        <select id="difficulty" disabled>
          <option value="easy">Easy (Random)</option>
          <option value="medium" selected>Medium (Smart)</option>
          <option value="hard">Hard (Groq)</option>
        </select>
      </div>

      <!-- Personality selector (for PvAI mode) -->
      <div class="personality-selector">
        <label for="personality">AI Personality:</label>
        <select id="personality" disabled>
          <option value="aggressive">Aggressive</option>
          <option value="defensive">Defensive</option>
          <option value="chill" selected>Chill</option>
        </select>
      </div>
      <!-- AI comment display -->
      <div class="ai-comment" id="ai-comment"></div>
      <div class="status" id="status">Player X's turn</div>
      <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>
      <div class="game-actions">
        <button id="new-game-btn">New Game</button>
      </div>
      <!-- Game History Section -->
      <div class="game-history">
        <button id="view-history-btn">View Game History</button>
        <div class="game-actions">
          <button id="new-game-btn">New Game</button>
          <button id="view-stats-btn">View Stats</button>
          <!-- Add this line -->
        </div>
        <div id="history-modal" class="hidden">
          <div class="modal-content">
            <h3>Your Game History</h3>
            <div id="games-list"></div>
            <button id="close-history-btn">Close</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Client-side script -->
    <script>
      // Check auth status
      fetch("/check-auth")
        .then((response) => response.json())
        .then((data) => {
          if (data.loggedIn) {
            document.getElementById("auth-forms").classList.add("hidden");
            document
              .getElementById("welcome-message")
              .classList.remove("hidden");
            document.getElementById("username").textContent = data.username;
            document
              .getElementById("game-container")
              .classList.remove("hidden");
            initializeGame();
          }
        });

      // Game logic
      function initializeGame() {
        // Add these with your other variable declarations
        const viewStatsBtn = document.getElementById("view-stats-btn");
        const statsContainer = document.getElementById("stats-container");
        const backToGameBtn = document.getElementById("back-to-game-btn");
        const leaderboardBtn = document.getElementById("leaderboard-btn");
        const aiStatsBtn = document.getElementById("ai-stats-btn");
        const leaderboardContent = document.getElementById(
          "leaderboard-content",
        );
        const aiStatsContent = document.getElementById("ai-stats-content");
        const leaderboardBody = document.getElementById("leaderboard-body");
        const aiDifficultyBody = document.getElementById("ai-difficulty-body");
        const aiPersonalityBody = document.getElementById(
          "ai-personality-body",
        );
        const cells = document.querySelectorAll(".cell");
        const statusDisplay = document.getElementById("status");
        const newGameBtn = document.getElementById("new-game-btn");
        const viewHistoryBtn = document.getElementById("view-history-btn");
        const historyModal = document.getElementById("history-modal");
        const closeHistoryBtn = document.getElementById("close-history-btn");
        const gamesList = document.getElementById("games-list");
        const gameContainer = document.getElementById("game-container");
        const pvpBtn = document.getElementById("pvp-btn");
        const pvaiBtn = document.getElementById("pvai-btn");
        const difficultySelect = document.getElementById("difficulty");
        const aiCommentDisplay = document.getElementById("ai-comment");

        let currentPlayer = "X";
        let gameState = ["", "", "", "", "", "", "", "", ""]; // CORRECT: 9 elements
        let gameActive = true;
        let gameMode = "pvp";
        let isAITurn = false;
        let difficulty = "medium";

        // Win conditions
        const winConditions = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8],
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8],
          [0, 4, 8],
          [2, 4, 6],
        ];
        const personalitySelect = document.getElementById("personality");
        let personality = "chill"; // Default to Chill

        // Handle cell click
        function handleCellClick(e) {
          if (
            !historyModal.classList.contains("hidden") ||
            !gameActive ||
            isAITurn
          ) {
            return;
          }

          const clickedCell = e.target;
          const clickedCellIndex = parseInt(
            clickedCell.getAttribute("data-index"),
          );

          if (gameState[clickedCellIndex] !== "") {
            return;
          }

          gameState[clickedCellIndex] = currentPlayer;
          clickedCell.textContent = currentPlayer;

          if (checkWin()) {
            statusDisplay.textContent = `Player ${currentPlayer} wins!`;
            saveGame(currentPlayer);
            gameActive = false;
            return;
          } else if (checkTie()) {
            statusDisplay.textContent = "Game ended in a tie!";
            saveGame(null);
            gameActive = false;
            return;
          }

          // Switch player
          currentPlayer = currentPlayer === "X" ? "O" : "X";
          statusDisplay.textContent = `Player ${currentPlayer}'s turn`;

          // If in PvAI mode and it's O's turn, let AI move
          if (gameMode === "pvai" && currentPlayer === "O" && gameActive) {
            isAITurn = true;
            statusDisplay.textContent = "AI is thinking...";
            aiCommentDisplay.textContent = "";
            fetch("/ai-move", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                moves: gameState,
                difficulty: difficulty,
                personality: personality, // Add this line
              }),
            })
              .then((response) => response.json())
              .then((data) => {
                if (data.move !== undefined && gameState[data.move] === "") {
                  gameState[data.move] = "O";
                  cells[data.move].textContent = "O";
                  if (data.comment) {
                    aiCommentDisplay.textContent = `AI: ${data.comment}`;
                  }
                  if (checkWin()) {
                    statusDisplay.textContent = "AI wins!";
                    saveGame("O");
                    gameActive = false;
                  } else if (checkTie()) {
                    statusDisplay.textContent = "Game ended in a tie!";
                    saveGame(null);
                    gameActive = false;
                  } else {
                    currentPlayer = "X";
                    statusDisplay.textContent = "Player X's turn";
                  }
                }
                isAITurn = false;
              })
              .catch((error) => {
                console.error("Error fetching AI move:", error);
                isAITurn = false;
                statusDisplay.textContent = `Player ${currentPlayer}'s turn`;
              });
          }
        }

        // Check for win
        function checkWin() {
          return winConditions.some((condition) => {
            return condition.every((index) => {
              return gameState[index] === currentPlayer;
            });
          });
        }

        // Check for tie
        function checkTie() {
          return !gameState.includes("");
        }

        // Save game to server
        function saveGame(winner) {
          fetch("/save-game", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              moves: gameState,
              winner: winner,
              difficulty: gameMode === "pvai" ? difficulty : null, // Save difficulty
              personality: gameMode === "pvai" ? personality : null, // Save personality
            }),
          })
            .then((response) => response.json())
            .then((data) => {
              console.log("Game saved:", data);
            })
            .catch((error) => {
              console.error("Error saving game:", error);
            });
        }

        // Load and display game history
        function loadGameHistory() {
          fetch("/user-games")
            .then((response) => response.json())
            .then((games) => {
              gamesList.innerHTML = "";
              if (games.length === 0) {
                gamesList.innerHTML = "<p>No games played yet.</p>";
                return;
              }
              games.forEach((game, index) => {
                const gameItem = document.createElement("div");
                gameItem.className = "game-item";
                const winnerText = game.winner
                  ? `Winner: ${game.winner}`
                  : "Tie";
                const date = new Date(game.timestamp).toLocaleString();
                gameItem.innerHTML = `
                <p><strong>Game ${index + 1}</strong> - ${date}</p>
                <p>${winnerText}</p>
                <p>Moves: ${game.moves.join(", ")}</p>
              `;
                gamesList.appendChild(gameItem);
              });
            })
            .catch((error) => {
              console.error("Error loading game history:", error);
              gamesList.innerHTML = "<p>Error loading game history.</p>";
            });
          // Stats navigation
          viewStatsBtn.addEventListener("click", () => {
            statsContainer.classList.remove("hidden");
            gameContainer.classList.add("hidden");
            loadLeaderboard();
          });

          backToGameBtn.addEventListener("click", () => {
            statsContainer.classList.add("hidden");
            gameContainer.classList.remove("hidden");
          });

          leaderboardBtn.addEventListener("click", () => {
            leaderboardContent.classList.remove("hidden");
            aiStatsContent.classList.add("hidden");
            loadLeaderboard();
          });

          aiStatsBtn.addEventListener("click", () => {
            aiStatsContent.classList.remove("hidden");
            leaderboardContent.classList.add("hidden");
            loadAIStats();
          });
        }

        // Reset game
        function resetGame() {
          gameState = ["", "", "", "", "", "", "", "", ""]; // CORRECT: 9 elements
          currentPlayer = "X";
          gameActive = true;
          isAITurn = false;
          cells.forEach((cell) => {
            cell.textContent = "";
          });
          statusDisplay.textContent = `Player ${currentPlayer}'s turn`;
          aiCommentDisplay.textContent = "";
        }

        // Set game mode
        function setGameMode(mode) {
          gameMode = mode;
          pvpBtn.textContent =
            mode === "pvp" ? "PvP (Human vs Human) ✅" : "PvP (Human vs Human)";
          pvaiBtn.textContent =
            mode === "pvai" ? "PvAI (Human vs AI) ✅" : "PvAI (Human vs AI)";
          difficultySelect.disabled = mode !== "pvai";
          personalitySelect.disabled = mode !== "pvai";
          console.log(
            "Game mode set to:",
            mode,
            "Personality selector disabled:",
            personalitySelect.disabled,
          ); // Debug log
          resetGame();
        }

        // Add event listeners
        cells.forEach((cell) => {
          cell.addEventListener("click", handleCellClick);
        });
        newGameBtn.addEventListener("click", resetGame);
        viewHistoryBtn.addEventListener("click", () => {
          historyModal.classList.remove("hidden");
          loadGameHistory();
        });
        closeHistoryBtn.addEventListener("click", () => {
          historyModal.classList.add("hidden");
        });
        historyModal.addEventListener("click", (e) => {
          if (e.target === historyModal) {
            historyModal.classList.add("hidden");
          }
        });
        pvpBtn.addEventListener("click", () => {
          setGameMode("pvp");
          console.log("Switched to PvP mode. Game mode:", gameMode);
        });
        pvaiBtn.addEventListener("click", () => {
          setGameMode("pvai");
          console.log("Switched to PvAI mode. Game mode:", gameMode);
        });
        difficultySelect.addEventListener("change", () => {
          difficulty = difficultySelect.value;
          console.log("Difficulty set to:", difficulty);
          resetGame();
        });

        // Personality selector change
        personalitySelect.addEventListener("change", () => {
          personality = personalitySelect.value;
          console.log("Personality set to:", personality);
          resetGame();
        });

        // Stats navigation
        viewStatsBtn.addEventListener("click", () => {
          statsContainer.classList.remove("hidden");
          gameContainer.classList.add("hidden");
          loadLeaderboard();
        });

        backToGameBtn.addEventListener("click", () => {
          statsContainer.classList.add("hidden");
          gameContainer.classList.remove("hidden");
        });

        leaderboardBtn.addEventListener("click", () => {
          leaderboardContent.classList.remove("hidden");
          aiStatsContent.classList.add("hidden");
          loadLeaderboard();
        });

        aiStatsBtn.addEventListener("click", () => {
          aiStatsContent.classList.remove("hidden");
          leaderboardContent.classList.add("hidden");
          loadAIStats();
        });
      }
    </script>
    <!-- Stats Section (hidden by default) -->
    <div id="stats-container" class="hidden">
      <h2>Statistics</h2>
      <div class="stats-tabs">
        <button id="leaderboard-btn">Leaderboard</button>
        <button id="ai-stats-btn">AI Stats</button>
      </div>

      <!-- Leaderboard Content -->
      <div id="leaderboard-content" class="stats-content">
        <h3>Player Leaderboard</h3>
        <table id="leaderboard-table">
          <thead>
            <tr>
              <th>Rank</th>
              <th>Player</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Ties</th>
              <th>Win Rate</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>

      <!-- AI Stats Content -->
      <div id="ai-stats-content" class="stats-content hidden">
        <h3>AI Performance by Difficulty</h3>
        <table id="ai-difficulty-table">
          <thead>
            <tr>
              <th>Difficulty</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Ties</th>
              <th>Win Rate</th>
            </tr>
          </thead>
          <tbody id="ai-difficulty-body"></tbody>
        </table>

        <h3>AI Performance by Personality</h3>
        <table id="ai-personality-table">
          <thead>
            <tr>
              <th>Personality</th>
              <th>Wins</th>
              <th>Losses</th>
              <th>Ties</th>
              <th>Win Rate</th>
            </tr>
          </thead>
          <tbody id="ai-personality-body"></tbody>
        </table>
      </div>

      <button id="back-to-game-btn">Back to Game</button>
    </div>
  </body>
</html>
